default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        name: Enforce Conventional Commits (English)
        stages: [commit-msg]
        args: ["--strict"]

  - repo: local
    hooks:
      - id: treefmt
        name: Format Nix/TOML/JSON/YAML files
        entry: treefmt --fail-on-change
        language: system
        stages: [pre-commit]
        types_or: [nix, toml, json, yaml]

      - id: rumdl
        name: Format and lint Markdown files
        entry: rumdl check --fix --config rumdl.toml
        language: system
        stages: [pre-commit]
        types: [markdown]

      - id: gitleaks
        name: Detect secrets with gitleaks
        entry: gitleaks protect --staged --redact --config .gitleaks.toml
        language: system
        stages: [pre-commit]
        pass_filenames: false
